<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Verbes Irréguliers – Néerlandais</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-irreguliers">
  <div id="app">
    <header>
      <div class="header-top">
        <a href="index.html" class="btn-back-link">&#8592; Retour</a>
        <h1>Verbes Irréguliers</h1>
        <span></span>
      </div>
    </header>

    <main>
      <div class="score-bar">
        <div class="score-text">
          <span id="score-correct">0</span> correct
          &nbsp;·&nbsp;
          <span id="score-remaining">0</span> restant
        </div>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill" style="width:0%"></div>
        </div>
      </div>

      <div class="card-area">
        <div id="card" class="card">
          <div class="card-inner">

            <div class="card-front">
              <div class="card-header">
                <span id="badge-front" class="badge"></span>
                <p id="word-nl" class="word"></p>
                <span></span>
              </div>
              <p id="word-fr-front" class="word-fr-front"></p>
              <p class="hint">appuyez pour révéler</p>
            </div>

            <div class="card-back">
              <div class="card-header">
                <span id="badge-back" class="badge"></span>
                <p id="word-nl-back" class="word-nl-back"></p>
                <span></span>
              </div>
              <div class="conjugation-table">
                <div class="conj-row">
                  <span class="conj-label">Prétérit</span>
                  <span id="conj-preterit" class="conj-value"></span>
                </div>
                <div class="conj-divider"></div>
                <div class="conj-row">
                  <span class="conj-label">Participe passé</span>
                  <span id="conj-participe" class="conj-value"></span>
                </div>
              </div>
              <div id="context-box" class="context-box hidden">
                <p id="context-nl" class="context-nl"></p>
                <p id="context-fr" class="context-fr"></p>
              </div>
            </div>

          </div>
        </div>

        <div id="completion" class="completion hidden">
          <p class="completion-icon">&#10003;</p>
          <p class="completion-title">Bravo !</p>
          <p class="completion-sub">Tous les verbes sont révisés.</p>
          <button id="restart-btn" class="restart-btn">Recommencer</button>
        </div>
      </div>

      <div class="controls">
        <label class="checkbox-label">
          <input type="checkbox" id="show-context">
          <span>Afficher la phrase de contexte</span>
        </label>
      </div>

      <div id="answer-btns" class="answer-btns hidden">
        <button id="skip-btn"      class="btn-answer btn-skip"            >Passer &#8594;</button>
        <button id="incorrect-btn" class="btn-answer btn-incorrect hidden">&#10007; Incorrect</button>
        <button id="correct-btn"   class="btn-answer btn-correct   hidden">&#10003; Correct</button>
      </div>
    </main>
  </div>

  <script src="irreguliers.js"></script>
</body>
</html>
